<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prediction Web Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Prediction Web Tool</h1>

    <form id="uploadForm" class="card" method="POST" enctype="multipart/form-data">
      
      <!-- eRNA (matrix1) -->
      <label>Upload the eRNA file (bulk_log_example.rds): </label>
      <input type="file" id="matrix1" name="eRNA" accept=".rds" required />
      <p class="note">Parameter: eRNA</p>

      <!-- frac (matrix2) -->
      <label>Upload Cell Fraction file (cell_fraction_example.rds): </label>
      <input type="file" id="matrix2" name="frac" accept=".rds" required />
      <p class="note">Parameter: frac</p>

      <!-- type (matrix3) -->
      <label>Upload condition file (condition_example.rds): </label>
      <input type="file" id="matrix3" name="type" accept=".rds" required />
      <p class="note">Parameter: type</p>

      <!-- Hidden field to indicate R script -->
      <input type="hidden" name="script" value="example_runction.r" />

      <button type="submit" class="btn">Run Analysis</button>

      <div id="processing" class="processing hidden">
        Processing your data using example_runction.r...
      </div>
    </form>

    <div id="results" class="hidden card">
      <h2>Results</h2>
      <p id="summary"></p>

      <button class="btn-outline">Download Predictions (CSV)</button>
      <button class="btn-outline">Download Figures (PNG)</button>
      <button class="btn-outline">Download Log File</button>

      <h3>Visualization Preview</h3>
      <div class="plot-preview">[ Insert plot here ]</div>

      <button id="restart" class="btn">Start New Analysis</button>
    </div>
  </div>

  <script src="script.js"></script>

  <!-- Optional: basic processing behavior -->
  <script>
    const form = document.getElementById("uploadForm");
    const processing = document.getElementById("processing");

    form.addEventListener("submit", function() {
      processing.classList.remove("hidden");
    });
  </script>
</body>
</html>
