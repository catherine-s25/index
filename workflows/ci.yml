name: Python and R Setup

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup Python and Install Flask
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask

      # 2. Setup R and Check Version
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Check R version
        run: Rscript --version
